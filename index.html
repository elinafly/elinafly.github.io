<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elina Ishmukhametova</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 24px;
      padding: 48px 32px;
    }

    .hero-avatar {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--lavender-pale);
      box-shadow: 0 12px 48px rgba(107, 85, 148, 0.18);
    }

    .hero h1 {
      font-size: 2.8rem;
      margin-bottom: 6px;
    }

    .hero-role {
      font-size: 1.05rem;
      color: var(--lavender-dark);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .hero-institution {
      font-size: 0.92rem;
      color: var(--text-muted);
    }

    .hero-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 2rem; }
      .hero-avatar { width: 180px; height: 180px; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img src="images/photo.jpg" alt="Elina Ishmukhametova" class="hero-avatar" />

    <div>
      <h1>Elina Ishmukhametova</h1>
      <p class="hero-role">PhD Candidate in Behavioural and Experimental Economics</p>
      <p class="hero-institution">UMR 9221 – LEM, CNRS · University of Lille</p>
    </div>

    <nav class="hero-nav">
      <a href="about.html" class="btn btn-outline">About</a>
      <a href="research.html" class="btn btn-outline">Research</a>
      <a href="teaching.html" class="btn btn-outline">Teaching</a>
      <a href="cv.html" class="btn btn-outline">CV</a>
      <a href="contact.html" class="btn btn-outline">Contact</a>
    </nav>
  </div>

</body>
</html>
